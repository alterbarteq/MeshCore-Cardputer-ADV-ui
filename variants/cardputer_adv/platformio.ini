[cardputer_adv]
extends = esp32_base
board = m5stack-stamps3
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/cardputer_adv
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -D ESP32_CPU_FREQ=80
  -D P_LORA_DIO_1=4
  -D P_LORA_NSS=5
  -D P_LORA_RESET=3
  -D P_LORA_BUSY=6
  -D P_LORA_SCLK=40
  -D P_LORA_MISO=39
  -D P_LORA_MOSI=14
  -D PIN_SD_CS=12
  -D USE_SX1262
  -D USE_SD_CARD
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D PIN_BOARD_SDA=2
  -D PIN_BOARD_SCL=1
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=3.0
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D PIN_GPS_RX=13
  -D PIN_GPS_TX=15
  -D GPS_BAUD_RATE=115200
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/cardputer_adv>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}
  m5stack/M5Cardputer@^1.1.1
  m5stack/M5Unified@^0.2.16

[env:cardputer_adv_companion_radio_ble]
extends = cardputer_adv
build_flags =
  ${cardputer_adv.build_flags}
  ; -I examples/companion_radio/ui-new ; original UI
  -I variants/cardputer_adv/companion_radio/ui-cardputer ; custom UI
  -I examples/companion_radio
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=CardputerDisplay
  -D BLE_PIN_CODE=123456   ; dynamic, random PIN
  ; -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
  -D PIN_USER_BTN=0
  -D PIN_KEYBOARD_INT=11
  ; -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
  -D CUSTOM_CARDPUTER_UI=1 ; custom UI
build_src_filter = ${cardputer_adv.build_src_filter}
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  -<../examples/companion_radio/main.cpp>
  ; +<../examples/companion_radio/ui-new/*.cpp> ; original UI
lib_deps =
  ${cardputer_adv.lib_deps}
  densaugeo/base64 @ ~1.4.0
  m5stack/M5GFX@^0.2.22

